spring:
  application:
    name: item-service

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"

resilience4j:
  circuitbreaker:
    configs:
      # Base configuration shared by all circuit-breaker instances
      default:
        # Number of recent calls evaluated to calculate failure/slow-call rate
        sliding-window-size: 6
        # Open the circuit when >= 50% of calls fail
        failure-rate-threshold: 50
        # Keep the circuit open for 20 seconds before moving to half-open
        wait-duration-in-open-state: 20s
        # Allow 4 test calls while in half-open state
        permitted-number-of-calls-in-half-open-state: 4
        # Open the circuit when >= 50% of calls are slow
        slow-call-rate-threshold: 50
        # A call is considered slow if it takes longer than 2 seconds
        slow-call-duration-threshold: 2s
    instances:
      items:
        base-config: default
configuration:
  text: undefined
---
# Logging Configuration
logging:
  level:
    com.item.service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud.circuitbreaker: DEBUG
    io.github.resilience4j: DEBUG
    io.github.resilience4j.circuitbreaker: DEBUG
    org.springframework.aop: DEBUG
---
#spring.profiles.active=dev
#spring.cloud.config.uri=http://localhost:8888