# ============================================================
# Application Identity
# ============================================================
spring:
  application:
    name: service-gateway-server

# ============================================================
# Server
# ============================================================
server:
  port: 8090

# ============================================================
# Eureka Client — Service Discovery
# ============================================================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ============================================================
# Resilience4j — Circuit Breaker & Time Limiter
# ============================================================
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 6
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
    instances:
      products:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 2s
    instances:
      products:
        base-config: default
---
# ============================================================
# Spring Cloud Gateway — Routes
# NOTE: The 'uri' lb:// values must match the spring.application.name
#       of each downstream service registered with Eureka.
# ============================================================
spring:
  cloud:
    gateway:
      routes:
        # --- Products service ---
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products
          filters:
            # Circuit breaker
            - name: CircuitBreaker
              args:
                name: products
                fallbackUri: forward:/fallback/orders

        # --- Items service ---
        - id: item-service
          uri: lb://item-service
          predicates:
            - Path=/list
          filters:
            # Circuit breaker
            - name: CircuitBreaker
              args:
                name: products
                fallbackUri: forward:/fallback/orders
logging:
  level:
    com.app.gtw.service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud.circuitbreaker: DEBUG
    io.github.resilience4j: DEBUG
    io.github.resilience4j.circuitbreaker: DEBUG
    org.springframework.aop: DEBUG